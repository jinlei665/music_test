<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐网 - 发现音乐</title>
    <link rel="icon" href="img/音乐.svg" type="image/svg+xml">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <!-- Common CSS (Design System) -->
    <link rel="stylesheet" href="css/common.css">
    <!-- Page-specific CSS -->
    <link rel="stylesheet" href="css/index.css">
    <!-- Rank CSS (for bottom player) -->
    <link rel="stylesheet" href="css/rank.css">
</head>
<body>
    <!-- Three.js Particle Background -->
    <div id="particle-container"></div>

    <!-- Frosted Glass Navbar -->
    <nav class="navbar glass">
        <div class="nav-left">
            <a href="index.html" class="logo">
                <img src="img/微信图片_20241129160757.jpg" alt="Logo">
                <span>音乐网</span>
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html" class="active">发现音乐</a>
            <a href="rank.html">排行榜</a>
            <a href="singerlis.html">歌手</a>
            <a href="javascript:checkLogin()">个人中心</a>
        </div>
        <div class="nav-right">
            <div class="search-bar">
                <input type="text" placeholder="搜索音乐..." id="search-input">
                <button type="button" class="search-btn" id="search-btn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <a href="javascript:checkLogin()" class="user-btn" id="user-btn">
                <i class="far fa-user"></i>
            </a>
        </div>
    </nav>

    <!-- Hero Carousel -->
    <section class="hero-carousel">
        <div class="carousel-container">
            <div class="carousel-slides" id="carousel-slides">
                <!-- Slides will be dynamically generated -->
            </div>
            <button class="carousel-btn carousel-btn-left" id="carousel-prev">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button class="carousel-btn carousel-btn-right" id="carousel-next">
                <i class="fas fa-chevron-right"></i>
            </button>
            <div class="carousel-dots" id="carousel-dots"></div>
        </div>
    </section>

    <!-- Feature Cards Grid -->
    <section class="feature-section">
        <div class="container">
            <div class="feature-grid">
                <a href="index.html" class="feature-card glass">
                    <div class="feature-icon">
                        <i class="fas fa-music"></i>
                    </div>
                    <h3>每日推荐</h3>
                    <p>根据你的喜好推荐</p>
                </a>
                <a href="rank.html" class="feature-card glass">
                    <div class="feature-icon">
                        <i class="fas fa-list"></i>
                    </div>
                    <h3>排行榜</h3>
                    <p>热门歌曲榜单</p>
                </a>
                <a href="singerlis.html" class="feature-card glass">
                    <div class="feature-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <h3>歌手推荐</h3>
                    <p>发现优秀歌手</p>
                </a>
                <a href="rank.html" class="feature-card glass">
                    <div class="feature-icon">
                        <i class="fas fa-newspaper"></i>
                    </div>
                    <h3>新歌推荐</h3>
                    <p>最新发行歌曲</p>
                </a>
            </div>
        </div>
    </section>

    <!-- Song List Section -->
    <section class="song-section">
        <div class="container">
            <h2 class="section-title">热门歌曲</h2>
            <div class="song-grid" id="song-grid">
                <!-- Songs will be dynamically loaded -->
                <div class="loading-placeholder">加载中...</div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="js/jquery-3.0.0.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Particle.js -->
    <script src="js/particle.js"></script>
    <!-- Site JS -->
    <script src="js/site.js"></script>
    <!-- Player JS -->
    <script src="js/player.js"></script>
    <!-- Kugou JS -->
    <script src="js/kugou.js"></script>
    <!-- Page-specific JS -->
    <script src="js/index.js"></script>
    <!-- Load Unified Player -->
    <script>
    $(function() {
        $.get('player.html', function(html) {
            $('body').append(html);
            initMusicPlayer();
        });
    });
    </script>
</body>
</html>
