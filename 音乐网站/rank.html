<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排行榜 - 音乐网</title>
    <link rel="icon" href="img/音乐.svg" type="image/svg+xml">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <!-- Common CSS (Design System) -->
    <link rel="stylesheet" href="css/common.css">
    <!-- Page-specific CSS -->
    <link rel="stylesheet" href="css/rank.css">
</head>
<body>
    <!-- Three.js Particle Background -->
    <div id="particle-container"></div>

    <!-- Frosted Glass Navbar -->
    <nav class="navbar glass">
        <div class="nav-left">
            <a href="index.html" class="logo">
                <img src="img/微信图片_20241129160757.jpg" alt="Logo">
                <span>音乐网</span>
            </a>
        </div>
        <div class="nav-links">
            <a href="index.html">发现音乐</a>
            <a href="rank.html" class="active">排行榜</a>
            <a href="singerlis.html">歌手</a>
            <a href="javascript:checkLogin()">个人中心</a>
        </div>
        <div class="nav-right">
            <div class="search-bar">
                <input type="text" placeholder="搜索音乐..." id="search-input">
                <button type="button" class="search-btn" id="search-btn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <a href="javascript:checkLogin()" class="user-btn" id="user-btn">
                <i class="far fa-user"></i>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <h1 class="page-title" id="rank-title">排行榜</h1>

            <!-- Ranking Layout: Sidebar + Content -->
            <div class="rank-layout">
                <!-- Left Sidebar - Ranking Categories -->
                <aside class="rank-sidebar">
                    <div class="rank-list" id="rank-list">
                        <!-- Ranking items generated by JS -->
                    </div>
                </aside>

                <!-- Right Content - Song List -->
                <section class="rank-content">
                    <div class="rank-header">
                        <h2 class="rank-name" id="current-rank-name">加载中...</h2>
                        <div class="rank-actions">
                            <button class="btn-play-all" id="play-all-btn">
                                <i class="fas fa-play"></i> 播放全部
                            </button>
                        </div>
                    </div>

                    <div class="song-list-container">
                        <ul class="song-list" id="song-list">
                            <!-- Songs generated by JS -->
                        </ul>
                    </div>

                    <!-- Pagination -->
                    <div class="pagination" id="pagination">
                        <button class="page-btn" id="prev-page">
                            <i class="fas fa-chevron-left"></i> 上一页
                        </button>
                        <span class="page-info" id="page-info">第 1 页 / 共 1 页</span>
                        <button class="page-btn" id="next-page">
                            下一页 <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/jquery-3.0.0.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Particle.js -->
    <script src="js/particle.js"></script>
    <!-- Site JS -->
    <script src="js/site.js"></script>
    <!-- Player JS -->
    <script src="js/player.js"></script>
    <!-- Page-specific JS -->
    <script src="js/kugou.js"></script>
    <!-- Load Unified Player -->
    <script>
    $(function() {
        $.get('player.html', function(html) {
            $('body').append(html);
            initMusicPlayer();
        });
    });
    </script>
</body>
</html>
