<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>歌曲管理</title>
    <link rel="stylesheet" href="/static/css/singing.css">
    <link rel="stylesheet" href="/static/js/layer/layer/theme/default/layer.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Design System -->
    <link rel="stylesheet" href="/static/css/design-system.css">
    <script src="/static/js/jquery-3.0.0.js"></script>
    <script src="/static/js/layer/layer/layer.js"></script>
    <script src="/static/js/singing.js"></script>
</head>

<body>
    <!-- Vue 3 App -->
    <div id="app">
        <!-- 搜索表单 -->
        <form action="/singing/find_singing" method="get" class="mb-3">
            <div class="row g-2 align-items-center">
                <div class="col-auto">
                    <input type="text" name="song" value="{{ data.song }}" placeholder="请输入歌曲名" class="form-control">
                </div>
                <div class="col-auto">
                    <select name="rows" class="form-select">
                        <option value="5" {% if data.rows==5 %}selected{% endif %}>5条/页</option>
                        <option value="10" {% if data.rows==10 %}selected{% endif %}>10条/页</option>
                        <option value="20" {% if data.rows==20 %}selected{% endif %}>20条/页</option>
                    </select>
                </div>
                <div class="col-auto">
                    <input type="submit" value="搜索" class="btn btn-primary">
                </div>
                <div class="col-auto ms-auto">
                    <button type="button" class="btn btn-success bth_add">
                        <i class="fas fa-plus"></i> 新增
                    </button>
                </div>
            </div>
        </form>

        <!-- 歌曲列表表格 -->
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <td>歌曲信息</td>
                    <td>专辑</td>
                    <td>歌曲链接</td>
                    <td>歌曲封面</td>
                    <td>歌手</td>
                    <td>排行榜id</td>
                    <td>歌词</td>
                    <td>操作</td>
                </tr>
            </thead>
            <tbody>
                {% for item in data.lis %}
                    <tr>
                        <td>{{ item["song"] }}</td>
                        <td>{{ item["album"] }}</td>
                        <td>
                            <audio controls style="height: 30px;">
                                <source src="{{ item["singing"] }}">
                                Your browser does not support the audio element.
                            </audio>
                        </td>
                        <td>
                            <img src="{{ item['img'] if item['img'] else '/static/images/暂无图片.jpg' }}"
                                 alt="暂无图片" id="img" style="max-width: 50px;">
                        </td>
                        <td>{{ item["singerid"] }}</td>
                        <td>{{ item["rankid"] }}</td>
                        <td style="font-size: 12px; max-width: 150px;" class="text-truncate">
                            {{ item["intro"] }}
                        </td>
                        <td class="bth">
                            <button type="button" class="btn btn-sm btn-warning" data-id="{{ item["id"] }}">
                                <i class="fas fa-edit"></i> 修改
                            </button>
                            <button type="button" class="btn btn-sm btn-danger" data-id="{{ item["id"] }}" data-song="{{ item["song"] }}">
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

        <!-- Vue 分页组件 -->
        <nav v-if="totalPages > 1" aria-label="分页导航">
            <ul class="pagination justify-content-center">
                <li class="page-item" :class="{ disabled: currentPage <= 1 }">
                    <a class="page-link" :href="prevPageUrl">上一页</a>
                </li>
                <li
                    v-for="p in visiblePages"
                    :key="p"
                    class="page-item"
                    :class="{ active: p === currentPage }">
                    <a class="page-link" :href="getPageUrl(p)">{[ p ]}</a>
                </li>
                <li class="page-item" :class="{ disabled: currentPage >= totalPages }">
                    <a class="page-link" :href="nextPageUrl">下一页</a>
                </li>
            </ul>
        </nav>

        <!-- 隐藏的分页信息 -->
        <div id="pagination-data"
             data-current-page="{{ data.page }}"
             data-total-pages="{{ data.total_pages }}"
             data-song="{{ data.song }}"
             data-rows="{{ data.rows }}"
             style="display: none;">
        </div>
    </div>

    <!-- Vue 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.min.js"></script>

    <script>
    const { createApp, ref, computed, onMounted } = Vue;

    const app = createApp({
        setup() {
            const currentPage = ref(1);
            const totalPages = ref(1);
            const searchSong = ref('');
            const rows = ref(10);

            const prevPageUrl = computed(() => {
                if (currentPage.value <= 1) return '#';
                return `/singing/find_singing?song=${searchSong.value}&page=${currentPage.value - 1}&rows=${rows.value}`;
            });

            const nextPageUrl = computed(() => {
                if (currentPage.value >= totalPages.value) return '#';
                return `/singing/find_singing?song=${searchSong.value}&page=${currentPage.value + 1}&rows=${rows.value}`;
            });

            const getPageUrl = (p) => {
                return `/singing/find_singing?song=${searchSong.value}&page=${p}&rows=${rows.value}`;
            };

            const visiblePages = computed(() => {
                const pages = [];
                const maxVisible = 5;
                let start = Math.max(1, currentPage.value - Math.floor(maxVisible / 2));
                let end = Math.min(totalPages.value, start + maxVisible - 1);

                if (end - start < maxVisible - 1) {
                    start = Math.max(1, end - maxVisible + 1);
                }

                for (let i = start; i <= end; i++) {
                    pages.push(i);
                }
                return pages;
            });

            onMounted(() => {
                const paginationData = document.getElementById('pagination-data');
                if (paginationData) {
                    currentPage.value = parseInt(paginationData.dataset.currentPage) || 1;
                    totalPages.value = parseInt(paginationData.dataset.totalPages) || 1;
                    searchSong.value = paginationData.dataset.song || '';
                    rows.value = parseInt(paginationData.dataset.rows) || 10;
                }
            });

            return {
                currentPage,
                totalPages,
                prevPageUrl,
                nextPageUrl,
                getPageUrl,
                visiblePages
            };
        }
    });

    app.config.compilerOptions.delimiters = ['{[', ']}'];
    app.mount('#app');
    </script>
</body>
</html>
