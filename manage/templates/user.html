<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>用户管理</title>
    <link rel="stylesheet" href="/static/css/user.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Design System -->
    <link rel="stylesheet" href="/static/css/design-system.css">
</head>
<body>
    <!-- Vue 3 App -->
    <div id="app">
        <!-- 搜索表单 -->
        <form action="/manage/find_user" method="get" class="mb-3">
            <div class="row g-2 align-items-center">
                <div class="col-auto">
                    <input type="text" name="name" value="{{ data.name }}" placeholder="请输入用户名" class="form-control">
                </div>
                <div class="col-auto">
                    <select name="rows" class="form-select">
                        <option value="5" {% if data.rows==5 %}selected{% endif %}>5条/页</option>
                        <option value="10" {% if data.rows==10 %}selected{% endif %}>10条/页</option>
                        <option value="20" {% if data.rows==20 %}selected{% endif %}>20条/页</option>
                    </select>
                </div>
                <div class="col-auto">
                    <input type="submit" value="搜索" class="btn btn-primary">
                </div>
            </div>
        </form>

        <!-- 用户列表表格 -->
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <td class="yhm">用户名</td>
                    <td class="mm">密码</td>
                    <td class="id">身份</td>
                </tr>
            </thead>
            <tbody>
                {% for item in data.lis %}
                    <tr>
                        <td>{{ item["username"] }}</td>
                        <td>{{ item["password"] }}</td>
                        {% if item["level"]==0 %}
                            <td><span class="badge bg-danger">管理员</span></td>
                        {% else %}
                            <td><span class="badge bg-secondary">普通用户</span></td>
                        {% endif %}
                    </tr>
                {% endfor %}
            </tbody>
        </table>

        <!-- Vue 分页组件 -->
        <nav v-if="totalPages > 1" aria-label="分页导航">
            <ul class="pagination justify-content-center">
                <li class="page-item" :class="{ disabled: currentPage <= 1 }">
                    <a class="page-link" :href="prevPageUrl">上一页</a>
                </li>
                <li
                    v-for="p in visiblePages"
                    :key="p"
                    class="page-item"
                    :class="{ active: p === currentPage }">
                    <a class="page-link" :href="getPageUrl(p)">{[ p ]}</a>
                </li>
                <li class="page-item" :class="{ disabled: currentPage >= totalPages }">
                    <a class="page-link" :href="nextPageUrl">下一页</a>
                </li>
            </ul>
        </nav>

        <!-- 隐藏的分页信息，供 Vue 使用 -->
        <div id="pagination-data"
             data-current-page="{{ data.page }}"
             data-total-pages="{{ data.total_pages }}"
             data-name="{{ data.name }}"
             data-rows="{{ data.rows }}"
             style="display: none;">
        </div>
    </div>

    <script src="/static/js/user_pagination.js"></script>
    <!-- Vue 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.min.js"></script>

    <script>
    const { createApp, ref, computed, onMounted } = Vue;

    const app = createApp({
        setup() {
            const currentPage = ref(1);
            const totalPages = ref(1);
            const searchName = ref('');
            const rows = ref(10);

            const prevPageUrl = computed(() => {
                if (currentPage.value <= 1) return '#';
                return `/manage/find_user?name=${searchName.value}&page=${currentPage.value - 1}&rows=${rows.value}`;
            });

            const nextPageUrl = computed(() => {
                if (currentPage.value >= totalPages.value) return '#';
                return `/manage/find_user?name=${searchName.value}&page=${currentPage.value + 1}&rows=${rows.value}`;
            });

            const getPageUrl = (p) => {
                return `/manage/find_user?name=${searchName.value}&page=${p}&rows=${rows.value}`;
            };

            const visiblePages = computed(() => {
                const pages = [];
                const maxVisible = 5;
                let start = Math.max(1, currentPage.value - Math.floor(maxVisible / 2));
                let end = Math.min(totalPages.value, start + maxVisible - 1);

                if (end - start < maxVisible - 1) {
                    start = Math.max(1, end - maxVisible + 1);
                }

                for (let i = start; i <= end; i++) {
                    pages.push(i);
                }
                return pages;
            });

            onMounted(() => {
                const paginationData = document.getElementById('pagination-data');
                if (paginationData) {
                    currentPage.value = parseInt(paginationData.dataset.currentPage) || 1;
                    totalPages.value = parseInt(paginationData.dataset.totalPages) || 1;
                    searchName.value = paginationData.dataset.name || '';
                    rows.value = parseInt(paginationData.dataset.rows) || 10;
                }
            });

            return {
                currentPage,
                totalPages,
                prevPageUrl,
                nextPageUrl,
                getPageUrl,
                visiblePages
            };
        }
    });

    // 使用 Laravel 风格的模板语法避免冲突
    app.config.compilerOptions.delimiters = ['{[', ']}'];
    app.mount('#app');
    </script>
</body>
</html>
